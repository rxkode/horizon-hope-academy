# Horizon Hope Academy — Full Ecosystem Docker Compose
# Ports: postgres=5433, redis=6380, backend=8000, portal=8080
services:

  # ── Main PostgreSQL (backend API) ─────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hha_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hhacademy
      POSTGRES_PASSWORD: hhacademy_dev_password
      POSTGRES_DB: horizon_hope_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hhacademy -d horizon_hope_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RosarioSIS PostgreSQL (isolated) ──────────────────────
  postgres_sis:
    image: postgres:16-alpine
    container_name: hha_postgres_sis
    restart: unless-stopped
    environment:
      POSTGRES_USER: rosario
      POSTGRES_PASSWORD: rosario_dev_password
      POSTGRES_DB: rosariosis_db
    volumes:
      - postgres_sis_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rosario -d rosariosis_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hha_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "redis_dev_password"
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_dev_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: hha_backend
    restart: unless-stopped
    env_file:
      - ../../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://hhacademy:hhacademy_dev_password@postgres:5432/horizon_hope_db
      REDIS_URL: redis://:redis_dev_password@redis:6379/0
      MPESA_CALLBACK_URL: https://horizon-hope-academy.vercel.app/api/v1/payments/confirmation
      SIS_DATABASE_URL: postgresql://rosario:rosario_dev_password@postgres_sis:5432/rosariosis_db
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../backend/app:/app/app
      - ../../frontend/public/assets:/app/assets:ro

  # ── RosarioSIS School Portal ───────────────────────────────
  rosariosis:
    image: rosariosis/rosariosis:master
    container_name: hha_portal
    restart: unless-stopped
    environment:
      PGHOST: postgres_sis
      PGPORT: 5432
      PGUSER: rosario
      PGPASSWORD: rosario_dev_password
      PGDATABASE: rosariosis_db
      ROSARIOSIS_ADMIN_EMAIL: admin@horizonhopeacademy.sc.ke
      ROSARIOSIS_YEAR: 2025
      ROSARIOSIS_LANG: en_US
    volumes:
      - rosario_uploads:/var/www/html/uploads
    ports:
      - "8080:80"
    depends_on:
      postgres_sis:
        condition: service_healthy

volumes:
  postgres_data:
  postgres_sis_data:
  redis_data:
  rosario_uploads:
